<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="CounterPick Strategy — map-specific team composition recommendations for Overwatch 2 Flex Queue and Open Queue with detailed explanations.">
  <title>CounterPick – Strategy</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css?v=7">
  <style>
    .map-pick-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(110px,1fr));gap:8px}
    .map-pick-btn{background:var(--bg-card-alt);border:2px solid var(--border);border-radius:10px;padding:8px 6px;cursor:pointer;text-align:center;transition:all .15s}
    .map-pick-btn:hover{border-color:var(--gold);background:var(--bg-hover)}
    .map-pick-btn.selected{border-color:var(--gold-bright);background:var(--gold-dim)}
    .map-pick-btn img{width:100%;height:56px;object-fit:cover;border-radius:6px;margin-bottom:4px}
    .map-pick-btn .no-img{width:100%;height:56px;border-radius:6px;background:var(--bg-hover);display:grid;place-items:center;font-size:10px;color:var(--text-secondary);margin-bottom:4px}
    .map-pick-name{font-size:11px;color:var(--text);font-weight:600;line-height:1.2}
    .deck-card{background:var(--bg-card-alt);border:1px solid var(--border);border-radius:12px;padding:16px;margin-bottom:10px}
    .deck-card.recommended{border-color:var(--gold);background:linear-gradient(135deg,var(--gold-dim),var(--bg-card-alt))}
    .deck-label{font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.6px;margin-bottom:8px}
    .deck-label.best{color:var(--gold-bright)}
    .deck-label.alt{color:var(--text-secondary)}
    .deck-roster{display:flex;gap:10px;flex-wrap:wrap;margin-bottom:10px}
    .deck-hero{display:flex;flex-direction:column;align-items:center;gap:4px;width:64px}
    .deck-hero .hero-emoji-deck{font-size:32px;width:52px;height:52px;display:inline-flex;align-items:center;justify-content:center;border-radius:10px;border:2px solid var(--border);background:var(--bg-card-alt)}
    .deck-hero .hero-n{font-size:10px;color:var(--text);font-weight:600;text-align:center;line-height:1.15}
    .deck-hero .hero-r{font-size:9px;color:var(--text-secondary);text-transform:uppercase}
    .deck-why{font-size:13px;color:var(--text-secondary);line-height:1.55;margin-top:8px}
    .deck-tag{display:inline-block;font-size:10px;padding:3px 8px;border-radius:5px;font-weight:600;margin-right:4px;margin-bottom:4px}
    .mode-group-title{font-size:13px;font-weight:700;color:var(--gold);margin:14px 0 8px;text-transform:uppercase;letter-spacing:.5px}
    .queue-toggle{display:flex;gap:0;border:2px solid var(--border);border-radius:10px;overflow:hidden;margin-bottom:14px}
    .queue-toggle-btn{flex:1;padding:10px 16px;background:var(--bg-card-alt);color:var(--text-secondary);font-size:13px;font-weight:700;cursor:pointer;border:none;transition:all .15s;text-align:center}
    .queue-toggle-btn:hover{background:var(--bg-hover)}
    .queue-toggle-btn.active{background:var(--gold-dim);color:var(--gold-bright);border-color:var(--gold)}
    .deck-section-title{font-size:14px;font-weight:700;color:var(--gold);margin:16px 0 6px;padding-bottom:6px;border-bottom:1px solid var(--border)}
  </style>
</head>
<body>

  <header class="topbar">
    <div class="topbar-left">
      <div class="logo">
        <div class="logo-icon">CP</div>
        <div>
          <h1>CounterPick</h1>
          <p class="eyebrow">OVERWATCH 2 COUNTER TOOL</p>
        </div>
      </div>
    </div>
    <nav class="topbar-nav">
      <a class="nav-link" href="index.html">Flex Queue</a>
      <a class="nav-link" href="open-queue.html">Open Queue</a>
      <a class="nav-link" href="hero-insights.html">Patch &amp; Meta</a>
      <a class="nav-link" href="tip.html">Tip of the Day</a>
      <a class="nav-link active" href="strategy.html">Strategy</a>
    </nav>
    <div class="topbar-actions"></div>
  </header>

  <main style="padding:16px 20px;max-width:900px;margin:0 auto;display:flex;flex-direction:column;gap:14px">

    <section class="card">
      <div class="card-header">
        <h2>Queue Mode</h2>
      </div>
      <div class="queue-toggle" id="queue-toggle">
        <button class="queue-toggle-btn active" data-queue="flex" type="button">Flex Queue (1-2-2)</button>
        <button class="queue-toggle-btn" data-queue="open" type="button">Open Queue (6 any)</button>
      </div>
    </section>

    <section class="card">
      <div class="card-header">
        <h2>Pick a Map</h2>
        <span class="badge badge-orange" id="mode-label">—</span>
      </div>
      <p style="color:var(--text-secondary);font-size:13px;margin-bottom:12px">Select a map to see the best team compositions.</p>
      <div id="map-grid"></div>
    </section>

    <section class="card card-accent" id="deck-section" style="display:none">
      <div class="card-header">
        <h2 id="deck-map-name">—</h2>
        <span class="badge badge-orange" id="deck-mode">—</span>
      </div>
      <div id="deck-map-img" style="margin-bottom:14px"></div>
      <div id="deck-container"></div>
    </section>

  </main>

  <script src="data.js"></script>
  <script>
  (function () {
    const HERO_BY_NAME = Object.fromEntries(HERO_DB.map(h => [h.name, h]));

    const MAPS = {
      Escort: ['Circuit Royal', 'Dorado', 'Havana', 'Junkertown', 'Rialto', 'Route 66', 'Shambali Monastery', 'Watchpoint: Gibraltar'],
      Hybrid: ['Blizzard World', 'Eichenwalde', 'Hollywood', "King's Row", 'Midtown', 'Numbani', 'Paraíso'],
      Control: ['Busan', 'Ilios', 'Lijiang Tower', 'Nepal', 'Oasis', 'Samoa'],
      Push: ['Colosseo', 'Esperança', 'New Queen Street', 'Runasapi'],
      Flashpoint: ['Aatlis', 'New Junk City', 'Suravasa']
    };

    const MAP_IMAGES = {};

    // ── FLEX QUEUE Strategy data: 2 comps per map (best + alternative) ──
    const FLEX_STRATS = {
      // === ESCORT ===
      'Circuit Royal': {
        best: { tank:'Sigma', dps:['Widowmaker','Ashe'], sup:['Ana','Baptiste'], why:'Long sightlines favor double sniper pressure. Sigma controls high ground with Accretion and barrier. Ana + Baptiste provide burst healing and anti-nade combos from range.' },
        alt:  { tank:'Orisa', dps:['Hanzo','Sojourn'], sup:['Kiriko','Mercy'], why:'Orisa fortifies choke points while Hanzo gets easy Storm Arrows on grouped enemies. Sojourn covers mid-range. Kiriko cleanses anti-nade and Mercy damage boosts sightline DPS.' }
      },
      'Dorado': {
        best: { tank:'Reinhardt', dps:['Cassidy','Mei'], sup:['Ana','Lúcio'], why:'Tight streets reward brawl. Reinhardt pins through narrow corridors while Mei walls off retreats. Cassidy handles flankers. Lúcio speeds the team through chokes and Ana lands easy nades on clustered fights.' },
        alt:  { tank:'Sigma', dps:['Junkrat','Hanzo'], sup:['Baptiste','Moira'], why:'Junkrat thrives in Dorado\'s tight angles with bouncing grenades. Sigma absorbs spam. Hanzo scouts with Sonic Arrow. Baptiste and Moira sustain through the constant poke.' }
      },
      'Havana': {
        best: { tank:'Sigma', dps:['Widowmaker','Cassidy'], sup:['Ana','Mercy'], why:'Open streets with long angles. Widowmaker dominates from rooftops, Mercy damage boosts her. Sigma plays corners with rock and shield. Ana can anti-nade from safety at range.' },
        alt:  { tank:'Orisa', dps:['Ashe','Sojourn'], sup:['Baptiste','Kiriko'], why:'Orisa anchors the payload with Fortify. Ashe + Sojourn double up on mid-range burst. Baptiste Immortality Field saves against sniper picks, Kiriko cleanses and teleports to high ground.' }
      },
      'Junkertown': {
        best: { tank:'Ramattra', dps:['Bastion','Torbjörn'], sup:['Baptiste','Ana'], why:'Wide open first point lets Bastion shred from range. Ramattra blocks with barrier then punishes in Nemesis form. Torbjörn turret controls flanks. Baptiste and Ana provide massive sustain.' },

    const grid = document.getElementById('map-grid');
    const modeLabel = document.getElementById('mode-label');
    const deckSection = document.getElementById('deck-section');
    const deckMapName = document.getElementById('deck-map-name');
    const deckMode = document.getElementById('deck-mode');
    const deckMapImg = document.getElementById('deck-map-img');
    const deckContainer = document.getElementById('deck-container');
    const queueToggle = document.getElementById('queue-toggle');

    let selectedMap = null;
    let queueMode = 'flex';

    queueToggle.addEventListener('click', e => {
      const btn = e.target.closest('.queue-toggle-btn');
      if (!btn) return;
      queueToggle.querySelectorAll('.queue-toggle-btn').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      queueMode = btn.dataset.queue;
      if (selectedMap) showDecks(selectedMap);
    });

    function getMode(mapName) {
      for (const [mode, maps] of Object.entries(MAPS)) {
        if (maps.includes(mapName)) return mode;
      }
      return '—';
    }

    function renderMapGrid() {
      grid.innerHTML = '';
      Object.entries(MAPS).forEach(([mode, maps]) => {
        const title = document.createElement('div');
        title.className = 'mode-group-title';
        title.textContent = mode;
        grid.appendChild(title);

        const row = document.createElement('div');
        row.className = 'map-pick-grid';
        maps.forEach(map => {
          const btn = document.createElement('button');
          btn.type = 'button';
          btn.className = 'map-pick-btn' + (selectedMap === map ? ' selected' : '');
          btn.innerHTML = `<div class="map-pick-name">${map}</div>`;
          btn.addEventListener('click', () => selectMap(map));
          row.appendChild(btn);
        });
        grid.appendChild(row);
      });
    }

    function selectMap(map) {
      selectedMap = map;
      renderMapGrid();
      showDecks(map);
    }

    function showDecks(map) {
      const strats = queueMode === 'flex' ? FLEX_STRATS : OQ_STRATS;
      const strat = strats[map];
      const mode = getMode(map);
      if (!strat) {
        deckSection.style.display = 'none';
        return;
      }

      deckSection.style.display = '';
      deckMapName.textContent = map;
      deckMode.textContent = mode + (queueMode === 'open' ? ' — Open Queue' : ' — Flex Queue');

      deckMapImg.innerHTML = '';

      if (queueMode === 'flex') {
        deckContainer.innerHTML = renderFlexDeck(strat.best, 'Best Comp', true) + renderFlexDeck(strat.alt, 'Alternative Comp', false);
      } else {
        deckContainer.innerHTML = renderOQDeck(strat.best, 'Best Comp', true) + renderOQDeck(strat.alt, 'Alternative Comp', false);
      }

      deckSection.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
    }

    function renderFlexDeck(comp, label, isBest) {
      const heroes = [
        { name: comp.tank, role: 'Tank' },
        { name: comp.dps[0], role: 'Damage' },
        { name: comp.dps[1], role: 'Damage' },
        { name: comp.sup[0], role: 'Support' },
        { name: comp.sup[1], role: 'Support' }
      ];
      return renderDeckCard(heroes, comp.why, label, isBest);
    }

    function renderOQDeck(comp, label, isBest) {
      const heroes = comp.heroes.map(name => {
        const h = HERO_BY_NAME[name];
        return { name, role: h ? h.role : 'Damage' };
      });
      return renderDeckCard(heroes, comp.why, label, isBest);
    }

    function renderDeckCard(heroes, why, label, isBest) {
      const roleColors = { Tank: 'var(--tank)', Damage: 'var(--dps)', Support: 'var(--green)' };

      let html = `<div class="deck-card ${isBest ? 'recommended' : ''}">`;
      html += `<div class="deck-label ${isBest ? 'best' : 'alt'}">${isBest ? '★ ' : ''}${label}</div>`;
      html += '<div class="deck-roster">';
      heroes.forEach(h => {
        const hero = HERO_BY_NAME[h.name];
        const emoji = hero ? hero.emoji : '?';
        const color = roleColors[h.role] || 'var(--gold)';
        html += `<div class="deck-hero">
          <span class="hero-emoji-deck" role="img" aria-label="${h.name}">${emoji}</span>
          <div class="hero-n">${h.name}</div>
          <div class="hero-r" style="color:${color}">${h.role}</div>
        </div>`;
      });
      html += '</div>';
      html += `<div class="deck-why">${why}</div>`;
      html += '</div>';
      return html;
    }

    renderMapGrid();
  })();
