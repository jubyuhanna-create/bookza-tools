<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>CounterPick – Tip of the Day</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css?v=7">
</head>
<body>

  <header class="topbar">
    <div class="topbar-left">
      <div class="logo">
        <div class="logo-icon">CP</div>
        <div>
          <h1>CounterPick</h1>
          <p class="eyebrow">OVERWATCH 2 COUNTER TOOL</p>
        </div>
      </div>
    </div>
    <nav class="topbar-nav">
      <a class="nav-link" href="index.html">Flex Queue</a>
      <a class="nav-link" href="open-queue.html">Open Queue</a>
      <a class="nav-link" href="hero-insights.html">Patch &amp; Meta</a>
      <a class="nav-link active" href="tip.html">Tip of the Day</a>
      <a class="nav-link" href="strategy.html">Strategy</a>
    </nav>
    <div class="topbar-actions"></div>
  </header>

  <main style="padding:16px 20px;max-width:700px;margin:0 auto;display:flex;flex-direction:column;gap:14px">
    <section class="card card-accent" id="tip-card">
      <div class="card-header">
        <h2>Tip of the Day</h2>
        <span class="badge badge-orange" id="tip-date"></span>
      </div>
      <div id="tip-content" style="display:flex;flex-direction:column;align-items:center;gap:16px;padding:20px 0">
        <img id="tip-hero-img" src="" alt="" style="width:120px;height:120px;border-radius:16px;object-fit:cover;border:2px solid var(--gold-dim)">
        <div style="text-align:center">
          <h3 id="tip-hero-name" style="font-size:22px;color:var(--gold-bright);margin:0 0 4px"></h3>
          <span id="tip-hero-role" class="mini-tag" style="margin-bottom:14px;display:inline-block"></span>
        </div>
        <div id="tip-text" style="font-size:15px;line-height:1.65;color:var(--text);background:var(--bg-card-alt);border:1px solid var(--border);border-radius:10px;padding:16px 20px;max-width:500px;text-align:center"></div>
      </div>
    </section>

    <section class="card" id="extra-tips">
      <div class="card-header">
        <h2>More tips for this hero</h2>
      </div>
      <div id="extra-tips-list" style="display:flex;flex-direction:column;gap:8px"></div>
    </section>

    <section class="card">
      <div class="card-header">
        <h2>Matchup Quick Look</h2>
      </div>
      <div id="matchup-section" style="display:flex;flex-direction:column;gap:10px"></div>
    </section>
  </main>

  <script src="data.js"></script>
  <script>
  (function () {
    const HERO_BY_NAME = Object.fromEntries(HERO_DB.map(h => [h.name, h]));

    // Use today's date as seed for consistent daily pick
    function dayHash() {
      const d = new Date();
      const str = `${d.getFullYear()}-${d.getMonth()}-${d.getDate()}`;
      let hash = 0;
      for (let i = 0; i < str.length; i++) {
        hash = ((hash << 5) - hash) + str.charCodeAt(i);
        hash |= 0;
      }
      return Math.abs(hash);
    }

    const seed = dayHash();
    const hero = HERO_DB[seed % HERO_DB.length];
    const tipIndex = seed % hero.tips.length;
    const tip = hero.tips[tipIndex];

    // Date display
    const today = new Date();
    document.getElementById('tip-date').textContent = today.toLocaleDateString('en-US', { year: 'numeric', month: 'long', day: 'numeric' });

    // Hero info
    const img = document.getElementById('tip-hero-img');
    img.src = hero.image;
    img.alt = hero.name;
    img.addEventListener('error', () => { img.src = makeFallbackIcon(hero.name, hero.role); }, { once: true });

    document.getElementById('tip-hero-name').textContent = hero.name;
    const roleEl = document.getElementById('tip-hero-role');
    roleEl.textContent = hero.role;
    const roleColors = { Tank: 'var(--tank)', Damage: 'var(--dps)', Support: 'var(--green)' };
    roleEl.style.color = roleColors[hero.role] || 'var(--gold)';
    roleEl.style.borderColor = roleColors[hero.role] || 'var(--gold)';

    // Main tip
    document.getElementById('tip-text').textContent = tip;

    // Other tips
    const extraList = document.getElementById('extra-tips-list');
    hero.tips.forEach((t, i) => {
      if (i === tipIndex) return;
      const div = document.createElement('div');
      div.style.cssText = 'font-size:13px;line-height:1.55;color:var(--text-secondary);padding:10px 14px;background:var(--bg-card-alt);border:1px solid var(--border);border-radius:8px';
      div.textContent = t;
      extraList.appendChild(div);
    });
    if (extraList.children.length === 0) {
      extraList.innerHTML = '<p style="color:var(--text-secondary);font-size:13px">No extra tips for this hero.</p>';
    }

    // Matchup section
    const matchup = document.getElementById('matchup-section');
    let html = '';
    if (hero.strong_against.length) {
      html += '<div><div style="font-size:12px;font-weight:600;color:var(--green);margin-bottom:6px;text-transform:uppercase;letter-spacing:.5px">Strong against</div><div style="display:flex;flex-wrap:wrap;gap:6px">';
      hero.strong_against.forEach(n => {
        html += `<span style="font-size:12px;padding:4px 10px;background:var(--green-dim);border:1px solid var(--green);border-radius:6px;color:var(--green)">${n}</span>`;
      });
      html += '</div></div>';
    }
    if (hero.weak_against.length) {
      html += '<div><div style="font-size:12px;font-weight:600;color:var(--red);margin-bottom:6px;text-transform:uppercase;letter-spacing:.5px">Weak against</div><div style="display:flex;flex-wrap:wrap;gap:6px">';
      hero.weak_against.forEach(n => {
        html += `<span style="font-size:12px;padding:4px 10px;background:var(--red-dim);border:1px solid var(--red);border-radius:6px;color:var(--red)">${n}</span>`;
      });
      html += '</div></div>';
    }
    matchup.innerHTML = html;

    // Fallback icon
    function makeFallbackIcon(name, role) {
      const colorMap = { Tank: '5080b0', Damage: 'c44040', Support: '5a9a50' };
      const bg = colorMap[role] || 'c8a23c';
      const initials = (name || 'H').replace(/[^A-Za-zÀ-ÿ0-9]/g, ' ').split(/\s+/).filter(Boolean).slice(0, 2).map(p => p[0]).join('').toUpperCase();
      const svg = `<svg xmlns='http://www.w3.org/2000/svg' width='128' height='128'><defs><linearGradient id='g' x1='0' y1='0' x2='1' y2='1'><stop offset='0%' stop-color='#${bg}'/><stop offset='100%' stop-color='#111322'/></linearGradient></defs><rect rx='22' width='128' height='128' fill='url(#g)'/><text x='50%' y='52%' dominant-baseline='middle' text-anchor='middle' font-size='52' font-family='Arial' fill='white'>${initials}</text></svg>`;
      return `data:image/svg+xml;charset=utf-8,${encodeURIComponent(svg)}`;
    }
  })();
  </script>
</body>
</html>
